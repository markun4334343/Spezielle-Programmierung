services:
  data-service:
    build: ./data_service
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data  # Mountet den data-Ordner direkt nach /app/data im Container

  ai-service:
    build: ./ai_service
    ports:
      - "5002:5002"
    environment:
      - DATA_SERVICE_URL=http://data-service:5001/api/stats
      - AI_API_KEY=sk-d14d57adef31432f888f312aa56c51ef
      - AI_BASE_URL=https://api.deepseek.com/v1  # Wichtig, falls dein Key von DeepSeek ist!
    depends_on:
      - data-service