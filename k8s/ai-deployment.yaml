apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ai-service:latest
          imagePullPolicy: Never # Wichtig für lokale Images
          ports:
            - containerPort: 5002
          env:
            - name: DATA_SERVICE_URL
              value: "http://data-service:5001/api/stats"
            - name: AI_API_KEY
              value: "sk-d14d57adef31432f888f312aa56c51ef" # Trage hier für K8s deinen API Key ein
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  type: NodePort
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
      nodePort: 30002